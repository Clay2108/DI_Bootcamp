<!DOCTYPE html>
<html>
    <head>
        <title>Grid CSS</title>

        <style>
            #mygridcontainer{
                background-color: aqua;
                display:grid;
                grid-template-columns:100px repeat(2, 2fr) 3fr;
                grid-template-rows: repeat(5, 1fr);
                column-gap: 10px ;
                row-gap: 20px ;
            
            }

        .box{
            background-color: brown;
            margin: 10px;
            font-size:60px;
        }
        </style>

        <body>
            <h1>Let's Learn CSS Grid</h1>
            <div id=mygridcontainer>
                <div  class="box">1</div>
                <div  class="box">2</div>
                <div  class="box">3</div>
                <div class="box">4</div>
                <div class="box">5</div>
                <div class="box">6</div>
            </div>

        </body>
    </head>
</html>
